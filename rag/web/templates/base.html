<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecHoop — 1v1 Basketball Search</title>

    <!-- Tailwind CSS (Play CDN — local-only, no build step) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hoop-orange': '#F97316',
                        'hoop-amber':  '#F59E0B',
                        'hoop-dark':   '#0F172A',
                        'hoop-darker': '#020617',
                        'hoop-card':   '#1E293B',
                        'hoop-border': '#334155',
                    }
                }
            }
        }
    </script>

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Streaming cursor */
        .typing-cursor::after {
            content: '▊';
            animation: blink 1s step-end infinite;
            color: #F97316;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Smooth fade-in for cards */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Source card shimmer while loading */
        .shimmer {
            background: linear-gradient(90deg, #1E293B 25%, #334155 50%, #1E293B 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Chat message markdown styles */
        .prose-chat p { margin-bottom: 0.5em; }
        .prose-chat p:last-child { margin-bottom: 0; }
        .prose-chat ul, .prose-chat ol { margin: 0.5em 0; padding-left: 1.5em; }
        .prose-chat li { margin-bottom: 0.25em; }
        .prose-chat ul li { list-style: disc; }
        .prose-chat ol li { list-style: decimal; }
        .prose-chat a { color: #F97316; text-decoration: underline; text-underline-offset: 2px; }
        .prose-chat a:hover { color: #F59E0B; }
        .prose-chat strong { color: #F1F5F9; font-weight: 600; }
        .prose-chat .system-note { color: #94A3B8; font-style: italic; font-size: 0.75rem; display: block; margin-bottom: 0.5em; }
        .prose-chat .watch-arrow { color: #F97316; cursor: pointer; font-size: 0.65rem; margin-left: 0.35em; opacity: 0.7; transition: opacity 0.15s; vertical-align: middle; }
        .prose-chat .watch-arrow:hover { opacity: 1; }

        /* Video player modal */
        .video-modal-backdrop {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease-in-out;
        }
        .video-modal-content {
            position: relative; width: 90vw; max-width: 1100px; aspect-ratio: 16/9;
            background: #000; border-radius: 0.75rem; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .video-modal-content iframe { width: 100%; height: 100%; border: none; }
        .video-modal-close {
            position: absolute; top: -2.5rem; right: 0;
            color: #fff; font-size: 1.5rem; cursor: pointer;
            background: none; border: none; padding: 0.25rem 0.5rem;
        }
        .video-modal-close:hover { color: #F97316; }

        /* Watched badge */
        .watched-badge {
            background: rgba(34,197,94,0.15); color: #22c55e;
            font-size: 0.65rem; font-weight: 600;
            padding: 0.125rem 0.5rem; border-radius: 9999px;
            display: inline-flex; align-items: center; gap: 0.25rem;
        }

        /* Watch mode: hide spoiler elements (scores, winner highlights) */
        body[data-view-mode="watch"] .spoiler { display: none !important; }
        body[data-view-mode="watch"] .winner-highlight { color: inherit !important; }
    </style>
</head>
<body class="h-full bg-hoop-darker text-gray-100 antialiased" data-view-mode="watch">
    {% block content %}{% endblock %}

    <script src="/static/app.js?v={{ cache_bust }}"></script>
</body>
</html>
